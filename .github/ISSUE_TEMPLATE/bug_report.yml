name: Bug report
description: Report a product bug or regression
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug and expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal reproduction path.
      placeholder: |
        1. Open ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Device, iOS version, Xcode version, simulator or physical device.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Logs, screenshots, relevant configuration notes, or suspected cause.

