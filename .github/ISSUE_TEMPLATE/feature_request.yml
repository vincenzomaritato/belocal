name: Feature request
description: Propose a product or engineering improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the product or technical direction.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and tradeoffs
      description: Dependencies, constraints, open questions, or likely side effects.

